services:
  dns:
    image: "powerdns/pdns-recursor-54:latest"
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
  ntp:
    image: "cturra/ntp:latest"
    restart: unless-stopped
    ports:
      - "123:123/udp"
    cap_add:
      - SYS_TIME
    volumes:
      - ./chrony.conf:/etc/chrony/chrony.conf
      - chrony-data:/var/lib/chrony
volumes:
  chrony-data:
